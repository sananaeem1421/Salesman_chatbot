<head>

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #16a34a;
    --green2:  #22c55e;
    --dark:    #0f172a;
    --card:    #1e293b;
    --border:  #334155;
    --text:    #f1f5f9;
    --muted:   #94a3b8;
    --user-bg: #166534;
    --bot-bg:  #1e293b;
    --input-bg:#0f172a;
    --shadow:  0 4px 24px rgba(0,0,0,.4);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%);
    border-bottom: 1px solid #059669;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .avatar {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--green), var(--green2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(34,197,94,.3);
  }
  .header-info h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
  .header-info p  { font-size: .8rem; color: #86efac; margin-top: 2px; }
  .online-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    margin-left: auto;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.6; transform:scale(1.3); }
  }

  /* ── CHAT WINDOW ── */
  #chat-window {
    width: 100%;
    max-width: 780px;
    flex: 1;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    min-height: calc(100vh - 160px);
    max-height: calc(100vh - 160px);
  }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp .25s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    margin-top: 2px;
  }
  .bot-icon  { background: linear-gradient(135deg,#065f46,#047857); }
  .user-icon { background: linear-gradient(135deg,#1d4ed8,#2563eb); }

  .bubble {
    max-width: 72%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: .92rem;
    line-height: 1.6;
    word-break: break-word;
  }
  .bot-bubble  {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .user-bubble {
    background: var(--user-bg);
    border: 1px solid #166534;
    border-top-right-radius: 4px;
    color: #dcfce7;
  }

  /* ── QUICK QUESTIONS ── */
  #quick-wrap {
    width: 100%;
    max-width: 780px;
    padding: 0 16px 8px;
  }
  #quick-wrap p { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
  #quick-btns {
    display: flex; flex-wrap: wrap; gap: 7px;
  }
  .quick-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: #86efac;
    font-size: .78rem;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: inherit;
  }
  .quick-btn:hover { background: #065f46; border-color: var(--green); }

  /* ── INPUT BAR ── */
  #input-bar {
    width: 100%;
    max-width: 780px;
    padding: 10px 16px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: .92rem;
    font-family: inherit;
    padding: 12px 16px;
    border-radius: 12px;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color .15s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--green); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    background: linear-gradient(135deg, var(--green), var(--green2));
    border: none;
    color: #fff;
    width: 46px; height: 46px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s, transform .1s;
  }
  #send-btn:hover  { opacity: .9; transform: scale(1.04); }
  #send-btn:active { transform: scale(.97); }

  /* ── TYPING INDICATOR ── */
  .typing-dot {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 11px 15px;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: 16px; border-top-left-radius: 4px;
  }
  .typing-dot span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: bounce .9s infinite;
  }
  .typing-dot span:nth-child(2) { animation-delay: .15s; }
  .typing-dot span:nth-child(3) { animation-delay: .3s;  }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); }
    40%         { transform:translateY(-6px); }
  }

  /* ── SCROLLBAR ── */
  #chat-window::-webkit-scrollbar { width: 5px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media(max-width:500px) {
    .bubble { max-width: 85%; }
    header { padding: 14px 16px; }
  }
</style>
</head>

// ── LOGIC ──────────────────────────────────────────────────
function getResponse(input) {
  const q = input.toLowerCase().replace(/[?!.,؟،۔]/g, '').trim();

  let best = null, bestScore = 0;
  for (const [keywords, reply] of QA) {
    const score = keywords.filter(kw => q.includes(kw)).length;
    if (score > bestScore) { bestScore = score; best = reply; }
  }
  if (best && bestScore > 0) return best;

  // word-level fallback
  const words = q.split(/\s+/).filter(w => w.length > 2);
  for (const [keywords, reply] of QA) {
    for (const kw of keywords) {
      if (words.some(w => kw.includes(w) || w.includes(kw))) return reply;
    }
  }

  return `Mujhe is sawaal ka jawab abhi nahi pata. Alag alfaaz mein poochhein ya ${OWNER.name} se seedha rabta karein: ${OWNER.contact} (Mailsi)`;
}

// ── UI HELPERS ─────────────────────────────────────────────
const chatWindow = document.getElementById('chat-window');
const inputEl    = document.getElementById('user-input');

function addMsg(text, role) {
  const row  = document.createElement('div');
  row.className = `msg-row ${role}`;

  const icon = document.createElement('div');
  icon.className = `msg-icon ${role === 'bot' ? 'bot-icon' : 'user-icon'}`;
  icon.textContent = role === 'bot' ? '💼' : '🧑';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}-bubble`;
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  row.appendChild(icon);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  const icon = document.createElement('div');
  icon.className = 'msg-icon bot-icon'; icon.textContent = '💼';
  const dot = document.createElement('div');
  dot.className = 'typing-dot';
  dot.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(icon); row.appendChild(dot);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(getResponse(text), 'bot');
  }, 500 + Math.random() * 400);
}

function quickAsk(q) {
  inputEl.value = q;
  sendMessage();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter = new line)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
